<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnToDo | 로그인</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
        }
        .login-container {
            display: flex;
            width: 1000px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .login-info {
            flex: 1;
            padding: 60px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-info h1 {
            color: var(--primary-color);
            font-size: 36px;
            margin-bottom: 10px;
        }
        .login-info p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        .login-info .character {
            width: 200px;
            margin-top: 20px;
        }
        .login-form-section {
            flex: 1;
            padding: 60px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid #eee;
        }
        .login-card {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            text-align: center;
        }
        .login-card .logo-img {
            width: 60px;
            margin-bottom: 10px;
        }
        .login-card h2 {
            margin-bottom: 5px;
        }
        .login-card .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .links {
            font-size: 13px;
            color: #888;
        }
        .links a {
            margin: 0 10px;
        }
        .footer-info {
            margin-top: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-info">
            <h1>LearnToDo</h1>
            <p>LearnUs + Todo</p>
            <h2 style="font-size: 24px; margin-bottom: 15px;">오늘의 배움이,<br>내일의 성장을 만듭니다.</h2>
            <p style="font-size: 14px;">학습과 계획을 하나로 관리하는<br>스마트한 캠퍼스 동반자</p>
            <div style="flex-grow: 1; display: flex; align-items: flex-end;">
                <!-- Placeholder for character image -->
                <div style="width: 150px; height: 150px; background: #eef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px;">🐶</div>
            </div>
        </div>
        <div class="login-form-section">
            <div class="login-card">
                <div style="font-size: 40px; margin-bottom: 10px;">📘</div>
                <h2>LearnToDo</h2>
                <p class="subtitle">LearnUs + Todo</p>
                
                <form action="dashboard.html">
                    <div class="form-group">
                        <label>이메일 또는 아이디</label>
                        <input type="text" placeholder="이메일 또는 아이디를 입력하세요">
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="password" placeholder="비밀번호를 입력하세요">
                    </div>
                    <div class="options">
                        <label><input type="checkbox"> 로그인 상태 유지</label>
                    </div>
                    <button type="submit" class="btn-login">로그인</button>
                </form>
                
                <div class="links">
                    <span>또는</span><br><br>
                    <a href="#">회원가입</a> | <a href="#">비밀번호 찾기</a>
                </div>
                
                <div class="footer-info">
                    <span style="color: var(--primary-color);">✔️</span>
                    <span>로그인 후 연계포털 연동 가능<br><small>포털 연동을 통해 강의, 성적, 학사 정보를 더 편리하게 확인하세요.</small></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
