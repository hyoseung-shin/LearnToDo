<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnToDo | 성적 편집</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .summary-mini {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 12px;
        }
        .summary-mini-item {
            flex: 1;
            text-align: center;
        }
        .summary-mini-item .label { font-size: 12px; color: #666; }
        .summary-mini-item .value { font-size: 18px; font-weight: bold; color: var(--primary-color); }

        .edit-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        .edit-table th, .edit-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .edit-table th {
            background: #f8f9fa;
            font-size: 13px;
            color: #666;
        }
        .edit-table input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        .edit-table input[type="text"] {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .row-header {
            text-align: left !important;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .current-grade {
            font-size: 12px;
            color: #4caf50;
            display: block;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">📘 LearnToDo</div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item">🏠 홈</a>
                <div class="nav-item">📝 ToDo</div>
                <div class="nav-item">🔔 알림</div>
                <div class="nav-item active">📊 성적</div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <h2>성적 예측</h2>
                    <p style="font-size: 14px; color: #888;">현재 성적을 분석하고 목표 달성을 위한 예측 결과를 확인하세요.</p>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select class="btn btn-outline" style="padding: 8px;">
                        <option>2025년 1학기</option>
                    </select>
                    <button class="btn btn-primary" disabled>✏️ 성적 편집 중</button>
                    <div class="user-profile">
                        <div style="width: 35px; height: 35px; background: #ddd; border-radius: 50%;"></div>
                    </div>
                </div>
            </header>

            <div class="summary-mini">
                <div class="summary-mini-item">
                    <div class="label">현재 평균 학점</div>
                    <div class="value">3.42 / 4.5</div>
                </div>
                <div class="summary-mini-item">
                    <div class="label">목표 학점</div>
                    <div class="value">3.80 / 4.5</div>
                </div>
                <div class="summary-mini-item">
                    <div class="label">예상 학점</div>
                    <div class="value">3.74 / 4.5</div>
                </div>
                <div class="summary-mini-item">
                    <div class="label">목표 달성 확률</div>
                    <div class="value">78%</div>
                </div>
            </div>
            
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h4 class="card-title">1. 성적 편집 모드</h4>
                    <div style="font-size: 12px; color: #888;">
                        배점 기준 <select><option>기본</option></select> | 💡 도움말
                    </div>
                </div>
                
                <table class="edit-table">
                    <thead>
                        <tr>
                            <th>과목명</th>
                            <th>현재 성적</th>
                            <th>중간고사</th>
                            <th>기말고사</th>
                            <th>과제</th>
                            <th>퀴즈</th>
                            <th>출석</th>
                            <th>프로젝트</th>
                            <th>비고</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="row-header"><span>&gt;</span> 컴퓨터구조론</td>
                            <td><span class="value">92</span> <span class="current-grade">(A)</span><br><small>/100</small></td>
                            <td><input type="number" value="88"></td>
                            <td><input type="number" value="94"></td>
                            <td><input type="number" value="95"></td>
                            <td><input type="number" value="90"></td>
                            <td><input type="number" value="96"></td>
                            <td><input type="number" value="92"></td>
                            <td><input type="text" placeholder="메모 입력..."></td>
                            <td><button style="border:none; background:none; cursor:pointer;">🗑️</button></td>
                        </tr>
                        <tr>
                            <td class="row-header"><span>&gt;</span> 데이터베이스</td>
                            <td><span class="value">81</span> <span class="current-grade" style="color:#ef6c00;">(B+)</span><br><small>/100</small></td>
                            <td><input type="number" value="76"></td>
                            <td><input type="number" value="82"></td>
                            <td><input type="number" value="85"></td>
                            <td><input type="number" value="78"></td>
                            <td><input type="number" value="82"></td>
                            <td><input type="number" value=""></td>
                            <td><input type="text" placeholder="메모 입력..."></td>
                            <td><button style="border:none; background:none; cursor:pointer;">🗑️</button></td>
                        </tr>
                        <tr>
                            <td class="row-header"><span>&gt;</span> 교양영어</td>
                            <td><span class="value">93</span> <span class="current-grade">(A)</span><br><small>/100</small></td>
                            <td><input type="number" value="90"></td>
                            <td><input type="number" value="95"></td>
                            <td><input type="number" value="92"></td>
                            <td><input type="number" value="93"></td>
                            <td><input type="number" value="95"></td>
                            <td><input type="number" value="94"></td>
                            <td><input type="text" placeholder="메모 입력..."></td>
                            <td><button style="border:none; background:none; cursor:pointer;">🗑️</button></td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="action-bar">
                    <button class="btn btn-outline">🔄 변경 사항 초기화</button>
                    <button class="btn btn-primary" onclick="location.href='grades.html'">✅ 저장 및 결과 업데이트</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
